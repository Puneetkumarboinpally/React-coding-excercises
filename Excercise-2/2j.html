<!doctype html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ProductDetails({ title, price, discountPrice, imageSrc }) {
        return (
          <div>
            <img src={imageSrc} width="150" />
            <p>{title}</p>
            {discountPrice ? (
              <p>
                <del>Price: ${price}</del>
              </p>
            ) : (
              <p>Price: ${price}</p>
            )}

            {discountPrice && <p>Discount Price: ${discountPrice}</p>}
            <button>Add to Cart</button>
          </div>
        );
      }
      function App() {
        return (
          <>
            <ProductDetails
              imageSrc="./images/cotton-socks.png"
              title="Cotton Socks"
              price="10.90"
              discountPrice={5.45}
            />
            <ProductDetails
              imageSrc="./images/tennis-balls.png"
              title="Tennis balls"
              price="6.00"
            />
            <ProductDetails
              imageSrc="./images/plain-t-shirt.png"
              title="Plain T-Shirt"
              price="7.99"
            />
          </>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
